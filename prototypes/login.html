<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bowen Rides - Sign In</title>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-heading { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    
    <div id="root" class="w-full max-w-md"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Login = () => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [showPassword, setShowPassword] = useState(false);
            const [emailError, setEmailError] = useState(false);
            const [isValid, setIsValid] = useState(false);

            useEffect(() => {
                if (email.length > 0) {
                    const valid = email.endsWith('@bowen.edu.ng');
                    setEmailError(!valid);
                    // Button is only enabled if email is valid
                    setIsValid(valid); 
                } else {
                    setEmailError(false);
                    setIsValid(false);
                }
            }, [email]);

            return (
                <div className="bg-white rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 p-8 sm:p-10 w-full">
                    
                    {/* Logo */}
                    <div className="flex items-center justify-center gap-3 mb-8">
                        <div className="w-10 h-10 bg-[#0f172a] rounded flex items-center justify-center">
                            <div className="w-4 h-1.5 bg-[#cfa835] rounded-sm"></div>
                        </div>
                        <span className="font-heading font-bold text-xl text-[#0f172a]">Bowen Rides</span>
                    </div>

                    {/* Header */}
                    <div className="text-center mb-8">
                        <h1 className="font-heading text-3xl font-bold text-[#0f172a] mb-2">Welcome Back</h1>
                        <p className="text-slate-500 text-sm">Sign in with your official university email.</p>
                    </div>

                    {/* Form */}
                    <form onSubmit={(e) => e.preventDefault()} className="space-y-5">
                        <div>
                            <label className="block text-sm font-medium text-[#0f172a] mb-1.5">University Email</label>
                            <input 
                                type="email" 
                                value={email}
                                onChange={(e) => setEmail(e.target.value)}
                                placeholder="yourname@bowen.edu.ng"
                                className={`w-full px-4 py-3 rounded-lg border text-[#0f172a] placeholder-slate-400 ${emailError ? 'border-red-500 focus:ring-red-500' : 'border-slate-300 focus:ring-[#0f172a]'} focus:outline-none focus:ring-1 focus:border-transparent transition-colors`}
                            />
                            {emailError && (
                                <p className="mt-1.5 text-sm text-red-500">Access restricted to official Bowen emails.</p>
                            )}
                        </div>

                        <div>
                            <label className="block text-sm font-medium text-[#0f172a] mb-1.5">Password</label>
                            <div className="relative">
                                <input 
                                    type={showPassword ? "text" : "password"} 
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    placeholder="••••••••"
                                    className="w-full px-4 py-3 rounded-lg border border-slate-300 text-[#0f172a] placeholder-slate-400 focus:outline-none focus:ring-1 focus:ring-[#0f172a] focus:border-transparent transition-colors"
                                />
                                <button 
                                    type="button"
                                    onClick={() => setShowPassword(!showPassword)}
                                    className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors"
                                >
                                    {showPassword ? (
                                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className="w-5 h-5">
                                          <path strokeLinecap="round" strokeLinejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                                        </svg>
                                    ) : (
                                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className="w-5 h-5">
                                          <path strokeLinecap="round" strokeLinejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                                          <path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                        </svg>
                                    )}
                                </button>
                            </div>
                        </div>

                        <button 
                            type="submit"
                            disabled={!isValid}
                            className={`w-full py-3.5 mt-2 rounded-lg font-bold tracking-wide transition-all ${isValid ? 'bg-[#0f172a] text-white hover:bg-[#1e293b] shadow-md hover:shadow-lg' : 'bg-[#cbd5e1] text-[#64748b] cursor-not-allowed'}`}
                        >
                            SIGN IN
                        </button>
                    </form>

                    <div className="mt-8 text-center space-y-3">
                        <a href="#" className="block text-sm text-[#0f172a] font-medium hover:underline">Forgot password?</a>
                        <p className="text-sm text-slate-500">
                            New to the campus? <a href="#" className="text-[#cfa835] font-semibold hover:underline">Register</a>
                        </p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Login />);
    </script>
</body>
</html>
