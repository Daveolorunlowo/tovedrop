<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bowen Rides - Rider Dashboard</title>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; /* No vertical scrolling on body */
            overscroll-behavior-y: none;
        }
        .font-heading { font-family: 'Outfit', sans-serif; }
        
        /* Hide scrollbar for vehicle selection */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Map background simulation */
        .map-bg {
            background-color: #f1f5f9;
            background-image: radial-gradient(#e2e8f0 2px, transparent 2px);
            background-size: 32px 32px;
        }
    </style>
</head>
<body class="bg-gray-100">
    
    <div id="root" class="w-full"></div>

    <script type="text/babel">
        const { useState } = React;

        const Dashboard = () => {
            const [selectedService, setSelectedService] = useState('cab');

            return (
                <div className="h-[100dvh] w-full flex flex-col relative max-w-md mx-auto bg-white overflow-hidden shadow-2xl">
                    
                    {/* Top 60%: Interactive Map Placeholder */}
                    <div className="relative flex-grow map-bg flex flex-col items-center justify-center">
                        
                        {/* Hamburger Menu */}
                        <button className="absolute top-6 left-6 w-12 h-12 bg-white rounded-full shadow-md flex items-center justify-center z-10 hover:bg-gray-50 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="#0f172a" className="w-6 h-6">
                                <path strokeLinecap="round" strokeLinejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
                            </svg>
                        </button>

                        {/* Map Pin */}
                        <div className="flex flex-col items-center transform -translate-y-4">
                            <div className="relative">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className="w-12 h-12 text-[#cfa835]">
                                    <path fillRule="evenodd" d="M11.54 22.351l.07.04.028.016a.76.76 0 00.723 0l.028-.015.071-.041a16.975 16.975 0 001.144-.742 19.58 19.58 0 002.683-2.282c1.944-1.99 3.963-4.98 3.963-8.827a8.25 8.25 0 00-16.5 0c0 3.846 2.02 6.837 3.963 8.827a19.58 19.58 0 002.682 2.282 16.975 16.975 0 001.145.742zM12 13.5a3 3 0 100-6 3 3 0 000 6z" clipRule="evenodd" />
                                </svg>
                                <div className="absolute top-3.5 left-1/2 -translate-x-1/2 w-3 h-3 bg-white rounded-full"></div>
                            </div>
                            <div className="bg-[#0f172a] text-white px-4 py-1.5 rounded-full text-xs font-semibold shadow-lg mt-1 tracking-wide">
                                Pick up here
                            </div>
                        </div>
                    </div>

                    {/* Bottom 40%: Bottom Sheet */}
                    <div className="relative w-full bg-white rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.1)] flex flex-col z-20 h-[45vh] min-h-[420px]">
                        
                        {/* Drag Handle */}
                        <div className="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mt-3 mb-4"></div>
                        
                        <div className="flex-grow overflow-y-auto px-6 pb-28">
                            
                            {/* Location Inputs */}
                            <div className="relative pl-8 mb-8">
                                {/* Connecting line */}
                                <div className="absolute left-[11px] top-6 bottom-8 w-0.5 bg-gray-200"></div>
                                
                                {/* Pickup */}
                                <div className="relative mb-5">
                                    <div className="absolute -left-8 top-1/2 -translate-y-1/2 w-[18px] h-[18px] rounded-full border-[3px] border-[#cfa835] bg-white z-10"></div>
                                    <label className="text-xs font-semibold text-gray-500 mb-1.5 block">Pickup Location</label>
                                    <input 
                                        type="text" 
                                        value="Current Location" 
                                        className="w-full bg-[#f8fafc] border border-transparent px-4 py-3 rounded-xl text-[#0f172a] font-medium focus:outline-none" 
                                        readOnly 
                                    />
                                </div>

                                {/* Dropoff */}
                                <div className="relative">
                                    <div className="absolute -left-8 top-1/2 -translate-y-1/2 w-[18px] h-[18px] flex items-center justify-center bg-white z-10">
                                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className="w-[18px] h-[18px] text-[#0f172a]">
                                          <path fillRule="evenodd" d="M11.54 22.351l.07.04.028.016a.76.76 0 00.723 0l.028-.015.071-.041a16.975 16.975 0 001.144-.742 19.58 19.58 0 002.683-2.282c1.944-1.99 3.963-4.98 3.963-8.827a8.25 8.25 0 00-16.5 0c0 3.846 2.02 6.837 3.963 8.827a19.58 19.58 0 002.682 2.282 16.975 16.975 0 001.145.742zM12 13.5a3 3 0 100-6 3 3 0 000 6z" clipRule="evenodd" />
                                        </svg>
                                    </div>
                                    <label className="text-xs font-semibold text-gray-500 mb-1.5 block">Where to?</label>
                                    <div className="relative">
                                        <select className="w-full bg-[#f8fafc] border border-gray-200 px-4 py-3 rounded-xl text-[#0f172a] font-medium appearance-none focus:outline-none focus:ring-2 focus:ring-[#0f172a] focus:border-transparent transition-all">
                                            <option>Main Gate</option>
                                            <option>Block A Hostel</option>
                                            <option>CHS</option>
                                            <option>Library</option>
                                        </select>
                                        <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400">
                                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className="w-5 h-5">
                                              <path strokeLinecap="round" strokeLinejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
                                            </svg>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Vehicle Selection */}
                            <h3 className="text-[15px] font-bold text-[#0f172a] mb-3">Select Service</h3>
                            <div className="flex gap-4 overflow-x-auto pb-4 pt-1 snap-x hide-scrollbar">
                                
                                {/* Card 1: Campus Cab */}
                                <div 
                                    onClick={() => setSelectedService('cab')}
                                    className={`min-w-[150px] flex-shrink-0 rounded-2xl p-4 snap-start cursor-pointer transition-all ${selectedService === 'cab' ? 'border-[2px] border-[#cfa835] bg-[#fffbeb] shadow-sm scale-[1.02]' : 'border border-gray-200 bg-white hover:bg-gray-50 opacity-70'}`}
                                >
                                    <div className="flex justify-between items-start mb-3">
                                        <div className={`p-2 rounded-lg ${selectedService === 'cab' ? 'bg-[#fef08a]' : 'bg-gray-100'}`}>
                                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className={`w-6 h-6 ${selectedService === 'cab' ? 'text-[#a16207]' : 'text-gray-600'}`}>
                                              <path strokeLinecap="round" strokeLinejoin="round" d="M8.25 18.75a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 01-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 00-3.213-9.193 2.056 2.056 0 00-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177v-.958c0-.568-.422-1.048-.987-1.106a48.554 48.554 0 00-10.026 0 1.106 1.106 0 00-.987 1.106v7.635m12-6.677v6.677m0 4.5v-4.5m0 0h-12" />
                                            </svg>
                                        </div>
                                        <span className={`text-[11px] font-bold px-2 py-0.5 rounded ${selectedService === 'cab' ? 'bg-white text-[#0f172a] shadow-sm' : 'bg-gray-100 text-gray-500'}`}>1-4</span>
                                    </div>
                                    <h4 className="font-bold text-[#0f172a] text-sm">Campus Cab</h4>
                                    <p className="font-black text-[#0f172a] text-lg mt-1">₦75</p>
                                </div>

                                {/* Card 2: Shuttle Bus */}
                                <div 
                                    onClick={() => setSelectedService('shuttle')}
                                    className={`min-w-[150px] flex-shrink-0 rounded-2xl p-4 snap-start cursor-pointer transition-all ${selectedService === 'shuttle' ? 'border-[2px] border-[#0f172a] bg-[#f8fafc] shadow-sm scale-[1.02]' : 'border border-gray-200 bg-white hover:bg-gray-50 opacity-70'}`}
                                >
                                    <div className="flex justify-between items-start mb-3">
                                        <div className={`p-2 rounded-lg ${selectedService === 'shuttle' ? 'bg-slate-200' : 'bg-gray-100'}`}>
                                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className={`w-6 h-6 ${selectedService === 'shuttle' ? 'text-[#0f172a]' : 'text-gray-600'}`}>
                                              <path strokeLinecap="round" strokeLinejoin="round" d="M8.25 18.75a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 01-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 00-3.213-9.193 2.056 2.056 0 00-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177v-.958c0-.568-.422-1.048-.987-1.106a48.554 48.554 0 00-10.026 0 1.106 1.106 0 00-.987 1.106v7.635m12-6.677v6.677m0 4.5v-4.5m0 0h-12" />
                                            </svg>
                                        </div>
                                        <span className={`text-[11px] font-bold px-2 py-0.5 rounded ${selectedService === 'shuttle' ? 'bg-white text-[#0f172a] shadow-sm' : 'bg-gray-100 text-gray-500'}`}>Shared</span>
                                    </div>
                                    <h4 className="font-bold text-[#0f172a] text-sm">Shuttle Bus</h4>
                                    <p className="font-black text-[#0f172a] text-lg mt-1">₦60</p>
                                </div>
                            </div>
                        </div>
                        
                        {/* Action Button */}
                        <div className="absolute bottom-0 left-0 w-full p-4 bg-gradient-to-t from-white via-white to-transparent pt-8">
                            <button className="w-full bg-[#0f172a] text-[#cfa835] font-bold py-4 rounded-xl shadow-xl hover:bg-[#1e293b] active:scale-[0.98] transition-all text-lg tracking-wide flex items-center justify-center gap-2">
                                Request {selectedService === 'cab' ? 'Cab' : 'Shuttle'}
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2.5} stroke="currentColor" className="w-5 h-5">
                                  <path strokeLinecap="round" strokeLinejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
